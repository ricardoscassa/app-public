<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freedom Countdown</title>

<style>
:root {
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #e2e8f0;
    --accent: #38bdf8;
}

/* THEMES */
body.creepy {
    --bg: #020617;
    --accent: #ef4444;
}

body.funny {
    --bg: linear-gradient(135deg, #6366f1, #22c55e);
    --accent: #facc15;
}

/* BASE */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui;
    transition: all 0.5s ease;
}

/* CARD */
.card {
    text-align: center;
    padding: 40px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    z-index: 2;
    max-width: 500px;
    width: 90%;
}

/* TITLE */
h1 {
    margin-bottom: 10px;
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 20px;
}

/* COUNTDOWN */
.countdown {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.time {
    flex: 1;
}

.num {
    font-size: 2rem;
    font-weight: bold;
    color: var(--accent);
}

/* BUTTON */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* BARS */
.bars {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-around;
    pointer-events: none;
}

.bar {
    width: 6px;
    height: 100%;
    background: #888;
    transition: transform 0.5s ease;
}

/* MESSAGE */
.message {
    margin-top: 20px;
    font-style: italic;
    opacity: 0.8;
}

/* Creepy animation */
body.creepy .card {
    animation: flicker 3s infinite;
}

@keyframes flicker {
    0%,100% {opacity:1;}
    50% {opacity:0.85;}
}
</style>
</head>

<body class="creepy">

<button class="toggle" id="toggleBtn">😈 Creepy</button>

<div class="card">
    <h1 id="title">⛓️ Countdown</h1>
    <p class="subtitle" id="subtitle">They said I’d be out soon...</p>

    <div class="countdown">
        <div class="time"><div id="d" class="num">0</div>Days</div>
        <div class="time"><div id="h" class="num">0</div>Hours</div>
        <div class="time"><div id="m" class="num">0</div>Minutes</div>
        <div class="time"><div id="s" class="num">0</div>Seconds</div>
    </div>

    <div class="message" id="msg"></div>
</div>

<div class="bars" id="bars"></div>

<script>
// CREATE BARS
const barsContainer = document.getElementById("bars");
for(let i=0;i<10;i++){
    const b=document.createElement("div");
    b.className="bar";
    barsContainer.appendChild(b);
}

const end = new Date("2027-01-18").getTime();
const start = Date.now();

let mode = "creepy";

const creepyTexts = [
    "You hear that?",
    "Something moved.",
    "Don’t blink.",
    "They know."
];

const funnyTexts = [
    "Still loading freedom 😂",
    "Patience is overrated",
    "Have you tried snacks?",
    "Freedom.exe not found"
];

// TOGGLE
document.getElementById("toggleBtn").onclick = () => {
    if(mode === "creepy"){
        mode = "funny";
        document.body.className = "funny";
        toggleBtn.innerText = "😂 Funny";
        title.innerText = "😂 Still Waiting";
        subtitle.innerText = "This is fine.";
    } else {
        mode = "creepy";
        document.body.className = "creepy";
        toggleBtn.innerText = "😈 Creepy";
        title.innerText = "⛓️ Countdown";
        subtitle.innerText = "They said I’d be out soon...";
    }
};

// UPDATE
function update(){
    const now = Date.now();
    const diff = end - now;

    const total = end - start;
    const progress = 1 - diff/total;

    d.innerText = Math.floor(diff/86400000);
    h.innerText = Math.floor((diff/3600000)%24);
    m.innerText = Math.floor((diff/60000)%60);
    s.innerText = Math.floor((diff/1000)%60);

    // TEXT
    const texts = mode === "creepy" ? creepyTexts : funnyTexts;
    msg.innerText = texts[Math.floor(Math.random()*texts.length)];

    // BARS PROGRESSIVE OPEN
    document.querySelectorAll(".bar").forEach((bar,i)=>{
        const offset = (i - 5) * 20;
        bar.style.transform = `translateX(${offset * progress}px)`;
    });

    if(diff < 0){
        document.querySelector(".card").innerHTML = "<h1>🕊️ FREE</h1>";
    }
}

setInterval(update,1000);
</script>

</body>
</html>
